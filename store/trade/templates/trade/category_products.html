{% extends 'trade/base.html' %}

{% block content %}
<h1>{{ category.name }}</h1>
<div class="row">
{% for product in products %}
<div class="col-md-3">
    <div class="card mb-4">
        <a href="{% url 'detail' product.id %}">
            <img src="{{ product.image.url }}" class="card-img-top">
        </a>
        <div class="card-body">
            <h6>{{ product.name }}</h6>
            <p>{{ product.price }} $</p>
            <a href="{% url 'add_to_cart' product.id %}" class="btn btn-success">
                🛒 Ajouter au panier
            </a>        </div>
    </div>
</div>
{% endfor %}
</div>

{% endblock %}
